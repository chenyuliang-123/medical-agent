version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.cn
    container_name: agent-backend
    restart: unless-stopped
    ports:
      - "9880:8000"
    environment:
      # LLM 配置
      - LLM_PROVIDER=${LLM_PROVIDER:-zhipu}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      # OpenAI API 配置
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
      # 智谱AI 配置
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ZHIPU_MODEL=${ZHIPU_MODEL:-glm-4}
      # 数据库配置
      - DATABASE_URL=sqlite:///./data/agent.db
      - CHROMA_PERSIST_DIRECTORY=./data/chroma_db
      # 应用配置
      - APP_ENV=production
      - LOG_LEVEL=info
      - CORS_ORIGINS=http://localhost:18880,http://localhost
      # Agent 配置
      - AGENT_MAX_ITERATIONS=${AGENT_MAX_ITERATIONS:-10}
      - AGENT_VERBOSE=${AGENT_VERBOSE:-True}
    volumes:
      # 持久化数据
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.cn
    container_name: agent-frontend
    restart: unless-stopped
    ports:
      - "19880:80"
    depends_on:
      - backend
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  agent-network:
    driver: bridge

volumes:
  backend-data:
  backend-logs:
  backend-uploads:
